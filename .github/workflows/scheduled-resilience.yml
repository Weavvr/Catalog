# =============================================================================
# SCHEDULED RESILIENCE TESTING — Nightly and Weekly
# =============================================================================
# Performance baselines, load testing, accessibility, visual regression,
# full DAST active scan, and configuration hardening audit.
#
# Nightly (2 AM CT / 7 AM UTC): Performance + accessibility + hardening
# Weekly (Sunday 3 AM CT / 8 AM UTC): Load testing + full DAST
#
# Jobs gracefully skip when infrastructure isn't configured yet.
# =============================================================================

name: Scheduled Resilience Testing

on:
  schedule:
    - cron: '0 7 * * *'       # Nightly at 2 AM Central
    - cron: '0 8 * * 0'       # Weekly Sunday at 3 AM Central
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Which tests to run'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - weekly
          - all

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '20'
  TARGET_URL: ${{ secrets.STAGING_URL }}

jobs:
  # ===========================================================================
  # Configuration Hardening Audit (Nightly)
  # ===========================================================================
  hardening-audit:
    name: "Configuration Hardening Audit"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * *' || github.event.inputs.run_type == 'nightly' || github.event.inputs.run_type == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Audit codebase for security anti-patterns
        run: |
          echo "=== Configuration Hardening Audit ==="
          ISSUES=0

          # Check for eval() usage
          EVAL_COUNT=$(grep -rn "eval(" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . 2>/dev/null | grep -v node_modules | grep -v ".test." | wc -l)
          if [ "$EVAL_COUNT" -gt 0 ]; then
            echo "WARNING: Found $EVAL_COUNT eval() usages"
            grep -rn "eval(" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . 2>/dev/null | grep -v node_modules | grep -v ".test." | head -10
            ISSUES=$((ISSUES + 1))
          else
            echo "PASS: No eval() usage found"
          fi

          # Check for console.log in server code
          CONSOLE_COUNT=$(grep -rn "console\.log" --include="*.ts" server/src/ 2>/dev/null | grep -v node_modules | grep -v ".test." | grep -v "logger" | wc -l)
          if [ "$CONSOLE_COUNT" -gt 10 ]; then
            echo "WARNING: Found $CONSOLE_COUNT console.log statements in server code (use a logger)"
            ISSUES=$((ISSUES + 1))
          else
            echo "PASS: Console.log usage within acceptable range ($CONSOLE_COUNT)"
          fi

          # Check for hardcoded localhost/ports
          LOCALHOST_COUNT=$(grep -rn "localhost:" --include="*.ts" --include="*.tsx" server/src/ 2>/dev/null | grep -v node_modules | grep -v ".test." | grep -v "// " | wc -l)
          if [ "$LOCALHOST_COUNT" -gt 0 ]; then
            echo "WARNING: Found $LOCALHOST_COUNT hardcoded localhost references in server"
            ISSUES=$((ISSUES + 1))
          else
            echo "PASS: No hardcoded localhost in server code"
          fi

          # Check for TODO/FIXME/HACK comments
          TODO_COUNT=$(grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.ts" --include="*.tsx" . 2>/dev/null | grep -v node_modules | wc -l)
          echo "INFO: Found $TODO_COUNT TODO/FIXME/HACK comments (technical debt tracker)"

          # Check TypeScript strict mode
          if [ -f "tsconfig.json" ]; then
            if grep -q '"strict": true' tsconfig.json; then
              echo "PASS: TypeScript strict mode enabled"
            else
              echo "WARNING: TypeScript strict mode not enabled"
              ISSUES=$((ISSUES + 1))
            fi
          fi

          # Check for .env files committed
          ENV_FILES=$(find . -name ".env" -not -path "*/node_modules/*" -not -name ".env.example" -not -name ".env.*.example" 2>/dev/null | wc -l)
          if [ "$ENV_FILES" -gt 0 ]; then
            echo "FAIL: Found .env files in repository"
            find . -name ".env" -not -path "*/node_modules/*" -not -name ".env.example" 2>/dev/null
            ISSUES=$((ISSUES + 10))
          else
            echo "PASS: No .env files committed"
          fi

          echo ""
          echo "=== Audit complete: $ISSUES issues found ==="

          if [ "$ISSUES" -gt 5 ]; then
            echo "::error::Hardening audit found $ISSUES issues requiring attention"
            exit 1
          fi

  # ===========================================================================
  # Accessibility Scan (Nightly)
  # ===========================================================================
  accessibility:
    name: "Accessibility Scan (WCAG 2.1 AA)"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * *' || github.event.inputs.run_type == 'nightly' || github.event.inputs.run_type == 'all'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Check for accessibility tests
        id: check
        run: |
          if [ -f "playwright.config.ts" ] && command -v npx >/dev/null 2>&1; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::warning::Playwright not configured. Skipping accessibility scan."
          fi

      - name: Install Playwright + axe
        if: steps.check.outputs.run == 'true'
        run: |
          npx playwright install --with-deps chromium
          npm install -D @axe-core/playwright 2>/dev/null || true

      - name: Run accessibility audit
        if: steps.check.outputs.run == 'true'
        run: |
          if [ -n "${{ env.TARGET_URL }}" ]; then
            npx playwright test --grep accessibility 2>/dev/null || {
              echo "::warning::No accessibility tests found. Add @axe-core/playwright tests."
              exit 0
            }
          else
            echo "::warning::No STAGING_URL. Skipping accessibility scan."
          fi

  # ===========================================================================
  # Performance Baselines (Nightly)
  # ===========================================================================
  performance:
    name: "Performance Baselines"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * *' || github.event.inputs.run_type == 'nightly' || github.event.inputs.run_type == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Check for k6 tests
        id: check
        run: |
          if find . -path "*/tests/load/*" -name "*.js" -o -path "*/tests/performance/*" -name "*.js" 2>/dev/null | grep -q .; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::warning::No k6 test scripts found in tests/load/ or tests/performance/. Add them to enable performance baselines."
          fi

      - name: Install k6
        if: steps.check.outputs.run == 'true'
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run performance tests
        if: steps.check.outputs.run == 'true'
        run: |
          for test in tests/load/*.js tests/performance/*.js; do
            if [ -f "$test" ]; then
              echo "Running: $test"
              k6 run --out json=k6-results.json "$test" || true
            fi
          done

      - name: Upload results
        if: always() && steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: k6-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Load / Stress Testing (Weekly)
  # ===========================================================================
  load-test:
    name: "Load & Stress Testing"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 0' || github.event.inputs.run_type == 'weekly' || github.event.inputs.run_type == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Check for load tests and target URL
        id: check
        run: |
          if [ -z "${{ env.TARGET_URL }}" ]; then
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::warning::No STAGING_URL. Skipping load testing."
          elif find . -path "*/tests/load/*" -name "*.js" 2>/dev/null | grep -q .; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::warning::No load test scripts found."
          fi

      - name: Install k6
        if: steps.check.outputs.run == 'true'
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run load tests
        if: steps.check.outputs.run == 'true'
        run: |
          for test in tests/load/*.js; do
            if [ -f "$test" ]; then
              echo "Running load test: $test"
              k6 run \
                --vus 50 \
                --duration 2m \
                --out json=k6-load-results.json \
                "$test" || true
            fi
          done

      - name: Upload results
        if: always() && steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: k6-load-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Full DAST Active Scan (Weekly — more aggressive than post-merge baseline)
  # ===========================================================================
  full-dast:
    name: "Full DAST Active Scan"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 0' || github.event.inputs.run_type == 'weekly' || github.event.inputs.run_type == 'all'
    steps:
      - uses: actions/checkout@v4

      - name: Check for target URL
        id: check
        run: |
          if [ -n "${{ env.TARGET_URL }}" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::warning::No STAGING_URL. Skipping full DAST scan."
          fi

      - name: OWASP ZAP Full Scan
        if: steps.check.outputs.run == 'true'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
        continue-on-error: true

      - name: Upload ZAP Report
        if: always() && steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zap-full-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: "Resilience Summary"
    runs-on: ubuntu-latest
    needs: [hardening-audit, accessibility, performance, load-test, full-dast]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Scheduled Resilience Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hardening Audit | ${{ needs.hardening-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ${{ needs.accessibility.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ needs.performance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Load Testing | ${{ needs.load-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full DAST | ${{ needs.full-dast.result }} |" >> $GITHUB_STEP_SUMMARY

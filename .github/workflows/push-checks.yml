# =============================================================================
# PUSH CHECKS — Lightweight gate on every push to main
# =============================================================================
# Runs ONLY the fast, essential checks on every push. This replaces the
# heavyweight CI Security Gate that was burning thousands of minutes/month.
#
# For full security scans, use [scan] in your commit message or run the
# CI Security Gate workflow manually.
# =============================================================================

name: Push Checks (Lightweight)

on:
  push:
    branches: [main, master]

# Cancel in-progress runs for the same branch to save minutes
concurrency:
  group: push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # Fast lint + type check (~1-2 min)
  lint-and-types:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run check || npm run type-check || echo "::warning::No type-check script found"

      - name: ESLint
        run: npm run lint || echo "::warning::No lint script found"

  # Secrets detection on latest commit only (~30 sec)
  secrets-check:
    name: "Secrets Detection"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Scan latest commit for secrets
        run: gitleaks detect --source . --verbose --redact --exit-code 1 --log-opts="HEAD~1..HEAD"

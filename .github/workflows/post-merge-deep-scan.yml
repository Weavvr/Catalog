# =============================================================================
# POST-MERGE DEEP SCAN — Runs after code lands on main
# =============================================================================
# This workflow runs comprehensive tests that are too slow for PR gates but
# essential for production confidence. It covers:
#   - Full end-to-end test suite (Playwright)
#   - Dynamic Application Security Testing (DAST) via OWASP ZAP
#   - Full regression suite
#   - API contract validation
#   - Security header verification
#   - Dependency license deep scan
#
# SETUP REQUIRED:
#   1. Install Playwright: npx playwright install
#   2. Add E2E tests in /tests/e2e/ or /e2e/ directory
#   3. Ensure package.json has:
#        "test:e2e": "playwright test"
#        "test:regression": "vitest run --regression"  (or equivalent)
#   4. Set STAGING_URL in GitHub Secrets (your Replit staging/preview URL)
#      e.g., https://your-app--staging.repl.co
# =============================================================================

name: Post-Merge Deep Scan

on:
  push:
    branches: [main, master]

  # Allow manual trigger for on-demand deep scanning
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for DAST scanning (defaults to STAGING_URL secret)'
        required: false
        type: string

permissions:
  contents: read
  security-events: write
  issues: write          # For creating issues on critical findings

env:
  NODE_VERSION: '20'
  # Use input URL if provided via manual trigger, otherwise use secret
  TARGET_URL: ${{ github.event.inputs.target_url || secrets.STAGING_URL }}

jobs:
  # ===========================================================================
  # JOB 1: Full Regression Test Suite
  # ===========================================================================
  # The complete test suite — not just the fast subset from PRs.
  # This catches edge cases and interaction bugs across the full codebase.
  # ===========================================================================
  regression-tests:
    name: "Full Regression Suite"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test
        env:
          CI: true

  # ===========================================================================
  # JOB 2: End-to-End Tests (Playwright)
  # ===========================================================================
  # Full user journey testing through a real browser. These simulate actual
  # user interactions:
  #   - Login / authentication flows
  #   - Core business workflows end-to-end
  #   - Form submissions and validation
  #   - Navigation and routing
  #   - Error handling from the user's perspective
  #
  # Playwright runs in Chromium, Firefox, and WebKit for cross-browser coverage.
  # ===========================================================================
  e2e-tests:
    name: "End-to-End Tests (Playwright)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build --if-present

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ env.TARGET_URL || 'http://localhost:3000' }}

      # Save test results, traces, and screenshots for debugging failures
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ===========================================================================
  # JOB 3: DAST — Dynamic Application Security Testing (OWASP ZAP)
  # ===========================================================================
  # Unlike SAST (which reads your code), DAST actually ATTACKS your running
  # application to find vulnerabilities an external attacker would exploit:
  #   - SQL injection via form inputs and query params
  #   - Cross-site scripting (XSS) via reflected/stored inputs
  #   - Authentication bypass attempts
  #   - Session management weaknesses
  #   - Missing security headers
  #   - CSRF vulnerabilities
  #   - Information disclosure
  #   - Server misconfiguration
  #
  # This requires a running instance. Point it at your Replit staging URL.
  #
  # IMPORTANT: Only run against YOUR OWN applications. Never against
  # third-party services.
  # ===========================================================================
  dast-scan:
    name: "DAST — OWASP ZAP Scan"
    runs-on: ubuntu-latest
    if: env.TARGET_URL != ''    # Only run if we have a URL to scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ZAP Baseline scan — fast, covers OWASP Top 10
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          # Generate multiple report formats
          cmd_options: >-
            -a
            -j
            -l WARN
          allow_issue_writing: true

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30

  # ===========================================================================
  # JOB 4: Security Headers Verification
  # ===========================================================================
  # Checks that your deployed application returns proper security headers.
  # An auditor will absolutely check these. Missing headers are low-hanging
  # fruit findings that make you look negligent.
  #
  # Required headers for a production app:
  #   - Strict-Transport-Security (HSTS)
  #   - Content-Security-Policy (CSP)
  #   - X-Content-Type-Options: nosniff
  #   - X-Frame-Options: DENY or SAMEORIGIN
  #   - Referrer-Policy
  #   - Permissions-Policy
  #   - X-XSS-Protection (legacy but still expected)
  #   - Cache-Control on sensitive endpoints
  # ===========================================================================
  security-headers:
    name: "Security Headers Check"
    runs-on: ubuntu-latest
    if: env.TARGET_URL != ''
    steps:
      - name: Check security headers
        run: |
          echo "=== Security Headers Audit ==="
          echo "Target: ${{ env.TARGET_URL }}"
          echo ""

          HEADERS=$(curl -sI "${{ env.TARGET_URL }}")
          PASS=0
          FAIL=0
          WARN=0

          check_header() {
            local header_name=$1
            local severity=$2  # FAIL or WARN
            if echo "$HEADERS" | grep -qi "^${header_name}:"; then
              echo "✅ PASS: $header_name present"
              PASS=$((PASS + 1))
            else
              if [ "$severity" = "FAIL" ]; then
                echo "❌ FAIL: $header_name MISSING"
                FAIL=$((FAIL + 1))
              else
                echo "⚠️  WARN: $header_name missing (recommended)"
                WARN=$((WARN + 1))
              fi
            fi
          }

          # Critical security headers (FAIL if missing)
          check_header "Strict-Transport-Security" "FAIL"
          check_header "Content-Security-Policy" "FAIL"
          check_header "X-Content-Type-Options" "FAIL"
          check_header "X-Frame-Options" "FAIL"

          # Recommended headers (WARN if missing)
          check_header "Referrer-Policy" "WARN"
          check_header "Permissions-Policy" "WARN"
          check_header "X-XSS-Protection" "WARN"
          check_header "Cache-Control" "WARN"

          # Check for headers that should NOT be present
          echo ""
          echo "--- Checking for information leakage ---"
          if echo "$HEADERS" | grep -qi "^X-Powered-By:"; then
            echo "❌ FAIL: X-Powered-By header present (information disclosure)"
            FAIL=$((FAIL + 1))
          else
            echo "✅ PASS: X-Powered-By not exposed"
            PASS=$((PASS + 1))
          fi

          if echo "$HEADERS" | grep -qi "^Server:.*Express\|Server:.*Node"; then
            echo "❌ FAIL: Server header leaks technology stack"
            FAIL=$((FAIL + 1))
          else
            echo "✅ PASS: Server header does not leak stack info"
            PASS=$((PASS + 1))
          fi

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed, $WARN warnings ==="

          if [ $FAIL -gt 0 ]; then
            echo "::error::$FAIL critical security headers missing"
            exit 1
          fi

  # ===========================================================================
  # JOB 5: API Contract & Schema Validation
  # ===========================================================================
  # If you have an OpenAPI/Swagger spec, this validates that your actual
  # API responses match the documented schema. Catches:
  #   - Undocumented fields being returned (data leakage)
  #   - Missing required fields
  #   - Type mismatches
  #   - Schema drift between code and documentation
  # ===========================================================================
  api-validation:
    name: "API Schema Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Validate OpenAPI spec if it exists
      - name: Validate OpenAPI specification
        run: |
          if [ -f "openapi.yaml" ] || [ -f "openapi.json" ] || [ -f "swagger.yaml" ] || [ -f "swagger.json" ]; then
            npx @redocly/cli lint openapi.yaml || npx @redocly/cli lint openapi.json || \
            npx @redocly/cli lint swagger.yaml || npx @redocly/cli lint swagger.json
          else
            echo "No OpenAPI spec found — skipping schema validation"
            echo "Consider adding an openapi.yaml to enable API contract testing"
          fi

  # ===========================================================================
  # JOB 6: Dependency Deep Dive — Full Audit
  # ===========================================================================
  # More thorough than the PR-level check. This runs:
  #   - Full vulnerability audit at ALL severity levels
  #   - Outdated package detection
  #   - Duplicate dependency detection
  #   - Bundle size analysis (catches supply chain bloat)
  # ===========================================================================
  dependency-deep-scan:
    name: "SCA — Full Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Full audit including moderate severity
      - name: Full npm audit
        run: npm audit --audit-level=moderate || true

      # Check for outdated dependencies
      - name: Check for outdated packages
        run: |
          echo "=== Outdated Dependencies Report ==="
          npm outdated --long || true
          echo ""
          echo "Review above for packages with known security fixes in newer versions"

      # Check for duplicate dependencies (common supply chain issue)
      - name: Check for duplicate dependencies
        run: |
          npx depcheck --json > /dev/null 2>&1 || true
          echo "=== Unused Dependencies ==="
          npx depcheck 2>/dev/null || echo "Install depcheck for unused dependency detection"

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: npm-audit-report.json
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Summary notification
  # ===========================================================================
  notify:
    name: "Deep Scan Summary"
    runs-on: ubuntu-latest
    needs:
      - regression-tests
      - e2e-tests
      - dast-scan
      - security-headers
      - api-validation
      - dependency-deep-scan
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Post-Merge Deep Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Regression Tests | ${{ needs.regression-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST (ZAP) | ${{ needs.dast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Headers | ${{ needs.security-headers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Validation | ${{ needs.api-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-deep-scan.result }} |" >> $GITHUB_STEP_SUMMARY
